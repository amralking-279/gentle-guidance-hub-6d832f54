<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#04200d"/>
  <!-- Decorative outer frame -->
  <rect x="20" y="20" width="472" height="472" rx="80" fill="none" stroke="#c89b3c" stroke-width="3" opacity="0.4"/>
  <!-- Islamic geometric star frame -->
  <path d="M256 60
    L286 130 L356 100 L326 170 L396 190 L326 210 L356 280 L286 250 L256 320
    L226 250 L156 280 L186 210 L116 190 L186 170 L156 100 L226 130 Z"
    fill="none" stroke="#c89b3c" stroke-width="2" opacity="0.5"/>
  <!-- Inner decorative circle -->
  <circle cx="256" cy="190" r="115" fill="none" stroke="#c89b3c" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="190" r="105" fill="rgba(6,50,20,0.6)" stroke="#c89b3c" stroke-width="1" opacity="0.4"/>
  <!-- Quran book shape -->
  <g transform="translate(256, 195)">
    <!-- Book spine/binding -->
    <rect x="-5" y="-55" width="10" height="110" rx="3" fill="#8B6914"/>
    <!-- Left page -->
    <path d="M-5,-55 Q-65,-50 -75,-20 L-75,55 Q-65,50 -5,55 Z" fill="#f5e6c0" stroke="#c89b3c" stroke-width="1.5"/>
    <!-- Right page -->
    <path d="M5,-55 Q65,-50 75,-20 L75,55 Q65,50 5,55 Z" fill="#f5e6c0" stroke="#c89b3c" stroke-width="1.5"/>
    <!-- Page lines left -->
    <line x1="-60" y1="-20" x2="-15" y2="-20" stroke="#c8a84b" stroke-width="1" opacity="0.5"/>
    <line x1="-62" y1="-5" x2="-13" y2="-5" stroke="#c8a84b" stroke-width="1" opacity="0.5"/>
    <line x1="-62" y1="10" x2="-13" y2="10" stroke="#c8a84b" stroke-width="1" opacity="0.5"/>
    <line x1="-61" y1="25" x2="-14" y2="25" stroke="#c8a84b" stroke-width="1" opacity="0.5"/>
    <!-- Page lines right -->
    <line x1="15" y1="-20" x2="60" y2="-20" stroke="#c8a84b" stroke-width="1" opacity="0.5"/>
    <line x1="13" y1="-5" x2="62" y2="-5" stroke="#c8a84b" stroke-width="1" opacity="0.5"/>
    <line x1="13" y1="10" x2="62" y2="10" stroke="#c8a84b" stroke-width="1" opacity="0.5"/>
    <line x1="14" y1="25" x2="61" y2="25" stroke="#c8a84b" stroke-width="1" opacity="0.5"/>
    <!-- Book stand -->
    <path d="M-40,55 L-20,80 L20,80 L40,55 Z" fill="#8B6914" opacity="0.8"/>
    <rect x="-20" y="80" width="40" height="8" rx="4" fill="#6b4f10"/>
  </g>
  <!-- Arabic text: القرآن الكريم -->
  <text x="256" y="350" text-anchor="middle" font-family="serif" font-size="42" fill="#c89b3c" font-weight="bold">القرآن</text>
  <text x="256" y="400" text-anchor="middle" font-family="serif" font-size="34" fill="#d4af5a">الكريم</text>
  <!-- Bottom decorative line -->
  <line x1="156" y1="418" x2="356" y2="418" stroke="#c89b3c" stroke-width="1.5" opacity="0.5"/>
  <!-- Corner decorations -->
  <circle cx="70" cy="70" r="6" fill="#c89b3c" opacity="0.3"/>
  <circle cx="442" cy="70" r="6" fill="#c89b3c" opacity="0.3"/>
  <circle cx="70" cy="442" r="6" fill="#c89b3c" opacity="0.3"/>
  <circle cx="442" cy="442" r="6" fill="#c89b3c" opacity="0.3"/>
</svg>
